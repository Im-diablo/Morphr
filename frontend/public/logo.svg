  <line x1="246" y1="181" x2="308" y2="181" stroke="#FFD700" stroke-width="2.2" stroke-linecap="round" opacity="0.65" style="fill:rgb(0, 0, 0);stroke:rgb(255, 215, 0);color:rgb(251, 251, 254);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.65;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
